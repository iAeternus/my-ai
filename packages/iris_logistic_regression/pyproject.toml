[project]
name = "iris-logistic-regression"
version = "0.1.0"
description = "基于鸢尾花数据集的逻辑回归模型"
readme = "README.md"
requires-python = ">=3.13"

authors = [
    { name = "Ricky", email = "w_ziwei2004@163.com" }
]

dependencies = [
    "matplotlib>=3.11.0",
    "scikit-learn>=1.9.0",
    "torch>=2.0",
]

[project.scripts]
iris-logistic-regression = "iris_logistic_regression.main:main"

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"
