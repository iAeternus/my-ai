# 关系预测配置 — 冻结预训练 encoder，训练 RelationPredictionHead
#
# 用法:
#   uv run kge --config config/relation_prediction.yaml --encoder trans-e --dataset fb15k-237

task: relation_prediction

dataset:
  name: fb15k-237
  root: packages/kge/data
  batch_size: 1024

model:
  encoder_name: trans-e
  head_name: relation_prediction
  params:
    embedding_dim: 100
    hidden_dim: 256
    hidden_dropout: 0.3

optimizer:
  name: adam
  params:
    lr: 0.001

train:
  epochs: 200
  loss_type: cross_entropy
  eval_interval: 10
  early_stopping:
    enabled: true
    patience: 30
    monitor: val_acc
    min_delta: 0.0

experiment:
  name_prefix: kge_rp
  save_dir: packages/kge/outputs
  seeds: [42, 123, 456]
