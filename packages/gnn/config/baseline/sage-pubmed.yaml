# 论文主题分类 — SAGE on PubMed
# 训练: uv run gnn --config packages/gnn/config/baseline/sage-pubmed.yaml

task: node_classification

dataset:
  name: pubmed
  root: packages/gnn/data

model:
  name: sage
  params:
    hidden_dim: 64
    num_layers: 2
    dropout: 0.5
    aggr: mean

optimizer:
  name: adam
  params:
    lr: 0.01
    weight_decay: 0.0005

scheduler:
  enabled: true
  name: plateau
  params:
    factor: 0.5
    patience: 20

train:
  epochs: 200
  early_stopping:
    enabled: true
    patience: 50
    monitor: val_acc

runtime:
  device: auto
  compile: auto

experiment:
  name_prefix: nc
  save_dir: packages/gnn/outputs
  seeds: [42, 123, 456]
