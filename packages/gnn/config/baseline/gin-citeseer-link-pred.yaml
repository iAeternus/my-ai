# 引用推荐 — GIN on CiteSeer
# 训练: uv run gnn --config packages/gnn/config/baseline/gin-citeseer-link-pred.yaml

task: link_prediction

dataset:
  name: citeseer
  root: packages/gnn/data

model:
  name: gin
  params:
    hidden_dim: 64
    num_layers: 2
    dropout: 0.5
    link_predictor: dot_product

optimizer:
  name: adam
  params:
    lr: 0.01
    weight_decay: 0.0005

scheduler:
  enabled: true
  name: plateau
  params:
    factor: 0.5
    patience: 20

train:
  epochs: 200
  early_stopping:
    enabled: true
    patience: 30
    monitor: val_auc

runtime:
  device: auto
  compile: auto

experiment:
  name_prefix: lp
  save_dir: packages/gnn/outputs
  seeds: [42, 123, 456]
