# 链接预测 — 基线配置
#
# 通过 CLI 覆盖模型和数据集以运行不同的实验组合：
#   uv run gnn --config config/lp-baseline.yaml --model gcn --dataset cora
#   uv run gnn --config config/lp-baseline.yaml --model gat --dataset pubmed
#
# 可用模型: gcn | gat | gin | sage
# 可用数据集: cora | citeseer | pubmed
#
# 链接预测器默认为 dot_product，由 builder.py 自动提供。
# 如需使用 MLP 预测器，在 model.params 中设置 link_predictor: mlp。

task: link_prediction

dataset:
  name: cora
  root: packages/gnn/data

model:
  name: gcn
  params:
    hidden_dim: 64
    num_layers: 2
    dropout: 0.5

optimizer:
  name: adam
  params:
    lr: 0.01
    weight_decay: 0.0005

scheduler:
  enabled: true
  name: plateau
  params:
    factor: 0.5
    patience: 20

train:
  epochs: 200
  early_stopping:
    enabled: true
    patience: 30
    monitor: val_auc

runtime:
  device: auto
  compile: auto

experiment:
  name_prefix: lp
  save_dir: packages/gnn/outputs
  seeds: [42, 123, 456]
