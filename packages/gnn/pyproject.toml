[project]
name = "gnn"
version = "0.1.0"
description = "图神经网络"
readme = "README.md"
requires-python = ">=3.13"

authors = [
    { name = "Ricky", email = "w_ziwei2004@163.com" }
]

dependencies = [
    "core",
    "ipykernel>=7.3.0",
    "torch-geometric>=2.8.0",
]

[project.scripts]
gnn = "gnn.main:main"

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
core = { workspace = true }
